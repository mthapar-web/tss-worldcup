name: Update WC scores

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update group scores
        run: node update-scores.mjs

      - name: Update top scorers
        run: node update-scorers.mjs

      - name: Commit if changed
        run: |
          git config user.name  "wc-score-bot"
          git config user.email "bot@users.noreply.github.com"
          git add results.json scorers.json
          git diff --cached --quiet || git commit -m "data: auto-update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
